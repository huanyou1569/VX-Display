<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>VX-Display 甜甜圈体素预览 (体素扫描版)</title>
<style>
  body { margin:0; overflow:hidden; font-family:monospace; }
  #info { position:absolute; top:10px; left:10px; color:#fff; background:#000a; padding:8px 14px; border-radius:6px; font-size:13px; line-height:1.5; }
  #info2{ position:absolute; top:10px; right:10px; color:#fff; background:#000a; padding:8px 14px; border-radius:6px; font-size:12px; text-align:right; line-height:1.5; }
  #sliders{ position:absolute; bottom:20px; left:50%; transform:translateX(-50%); color:#fff; background:#000a; padding:10px 18px; border-radius:8px; font-size:12px; display:flex; gap:20px; align-items:center; }
  #sliders label { display:flex; align-items:center; gap:6px; }
  #sliders input { width:100px; }
</style>
</head>
<body>
<div id="info">
  甜甜圈 (Torus) — XY平面 绕Z轴<br>
  大半径 R=8 &nbsp; 小半径 r=3 &nbsp; 中心 (16,16,12)<br>
  <b>体素扫描填充</b> — 复刻 MCU is_expand_sphere 逻辑
</div>
<div id="info2">
  红框 = 32×32×24 体素边界<br>
  蓝线 = 旋转轴 (x=16,y=16)<br>
  拖拽旋转 | 滚轮缩放 | 右键平移
</div>
<div id="sliders">
  <label>大半径 R <input type="range" id="Rslider" min="2" max="15" value="8" step="0.5"></label>
  <span id="Rval">8.0</span>
  <label>小半径 r <input type="range" id="rslider" min="1" max="6" value="3" step="0.5"></label>
  <span id="rval">3.0</span>
  <label>缩放 <input type="range" id="scaleSlider" min="0.3" max="2.2" value="1.0" step="0.05"></label>
  <span id="scaleVal">1.00</span>
</div>
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
               "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const VOL_X = 32, VOL_Y = 32, VOL_Z = 24;
const CX = 16, CY = 16, CZ = 12;

// ---- 场景 ----
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.5, 200);
camera.position.set(38, 24, 30);
camera.lookAt(VOL_X/2, VOL_Y/2, VOL_Z/2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

new OrbitControls(camera, renderer.domElement);

scene.add(new THREE.AmbientLight(0x404060, 2.5));
const dl = new THREE.DirectionalLight(0xffffff, 3);
dl.position.set(20, 30, 20);
scene.add(dl);

// 体积边界框
const boxGeo = new THREE.BoxGeometry(VOL_X, VOL_Y, VOL_Z);
const boxEdges = new THREE.EdgesGeometry(boxGeo);
const boxLine = new THREE.LineSegments(boxEdges, new THREE.LineBasicMaterial({ color: 0xff4444 }));
boxLine.position.set(VOL_X/2, VOL_Y/2, VOL_Z/2);
scene.add(boxLine);

// 旋转轴 (x=16, y=16)
function addAxis() {
  const mat = new THREE.LineBasicMaterial({ color: 0x4488ff });
  const pts = [
    new THREE.Vector3(CX, CY, -2), new THREE.Vector3(CX, CY, VOL_Z+2)
  ];
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat));
  // 轴标签球
  const dot = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0x4488ff })
  );
  dot.position.set(CX, CY, CZ);
  scene.add(dot);
}
addAxis();

// 网格参考面
const gridHelper = new THREE.GridHelper(32, 32, 0x333355, 0x222233);
gridHelper.position.set(VOL_X/2, VOL_Y/2, 0);
scene.add(gridHelper);

// ---- 复刻 MCU: is_expand_sphere 体素扫描 ----
function generateTorusVoxels(R, r, scale) {
  // 缩放 (同 MCU: scale_num/scale_den)
  const R_cur = Math.max(2, Math.round(R * scale));
  const r_cur = Math.max(1, Math.round(r * scale));
  const R2 = R_cur * R_cur;
  const r2 = r_cur * r_cur;
  const threshold = r_cur;

  const bx_min = CX - (R_cur + r_cur);
  const bx_max = CX + (R_cur + r_cur);
  const by_min = CY - (R_cur + r_cur);
  const by_max = CY + (R_cur + r_cur);
  const bz_min = CZ - r_cur;
  const bz_max = CZ + r_cur;

  const voxels = [];

  for (let tx = bx_min; tx <= bx_max; tx++) {
    if (tx < 0 || tx >= VOL_X) continue;
    for (let ty = by_min; ty <= by_max; ty++) {
      if (ty < 0 || ty >= VOL_Y) continue;
      const dx = tx - CX, dy = ty - CY;
      const D2 = dx * dx + dy * dy;

      for (let tz = bz_min; tz <= bz_max; tz++) {
        if (tz < 0 || tz >= VOL_Z) continue;
        const dz = tz - CZ;

        // 环面方程: (sqrt(D2)-R)^2 + (z-cz)^2 ~= r^2
        const D_int = Math.round(Math.sqrt(D2));
        const delta = D_int - R_cur;
        const d2_check = delta * delta + dz * dz;

        if (Math.abs(d2_check - r2) <= threshold) {
          // 着色: 外缘亮, 顶面亮 (同 MCU 着色逻辑)
          const outer = Math.max(0, delta > 0 ? delta + r_cur : r_cur + delta);
          const top = dz > 0 ? dz : 0;
          const depth = (30 + outer * 12 + top * 8) / 128;

          voxels.push({
            x: tx, y: ty, z: tz,
            depth: Math.min(1, Math.max(0, depth))
          });
        }
      }
    }
  }
  return { voxels, R_cur, r_cur };
}

let instancedMesh = null;

function rebuildScene() {
  const R = parseFloat(document.getElementById('Rslider').value);
  const r = parseFloat(document.getElementById('rslider').value);
  const scale = parseFloat(document.getElementById('scaleSlider').value);
  document.getElementById('Rval').textContent = R.toFixed(1);
  document.getElementById('rval').textContent = r.toFixed(1);
  document.getElementById('scaleVal').textContent = scale.toFixed(2);

  const { voxels, R_cur, r_cur } = generateTorusVoxels(R, r, scale);

  document.getElementById('info').innerHTML =
    `甜甜圈 (Torus) — XY平面 绕Z轴<br>
     大半径 R=${R} → 缩放后 R_cur=${R_cur} &nbsp; 小半径 r=${r} → r_cur=${r_cur}<br>
     中心 (${CX},${CY},${CZ}) &nbsp; | &nbsp; <b>体素扫描: ${voxels.length} 体素</b>`;

  // 移除旧 mesh
  if (instancedMesh) {
    instancedMesh.geometry.dispose();
    instancedMesh.material.dispose();
    scene.remove(instancedMesh);
  }

  if (voxels.length === 0) return;

  const voxelGeo = new THREE.SphereGeometry(0.42, 6, 6);
  const voxelMat = new THREE.MeshStandardMaterial({ roughness: 0.3, metalness: 0.05 });
  instancedMesh = new THREE.InstancedMesh(voxelGeo, voxelMat, voxels.length);

  const dummy = new THREE.Object3D();
  voxels.forEach((v, i) => {
    dummy.position.set(v.x, v.y, v.z);
    dummy.updateMatrix();
    instancedMesh.setMatrixAt(i, dummy.matrix);
    // 按亮度着色: 暗(内缘/底部) → 亮(外缘/顶部)
    const hue = 0.12 + v.depth * 0.15;
    const lit = 0.25 + v.depth * 0.55;
    const color = new THREE.Color().setHSL(hue, 0.85, lit);
    instancedMesh.setColorAt(i, color);
  });
  instancedMesh.instanceMatrix.needsUpdate = true;
  if (instancedMesh.instanceColor) instancedMesh.instanceColor.needsUpdate = true;
  scene.add(instancedMesh);
}

document.getElementById('Rslider').addEventListener('input', rebuildScene);
document.getElementById('rslider').addEventListener('input', rebuildScene);
document.getElementById('scaleSlider').addEventListener('input', rebuildScene);

// 初始构建
rebuildScene();

// 渲染
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
